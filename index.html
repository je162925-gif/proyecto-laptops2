<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia Tecnológica Pro | Laptops, Hardware & Software</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #060913, #0b1120, #161233, #02040a);
            --card-bg: rgba(22, 32, 51, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Colores de acento por categoría */
            --accent-lp: #bf55ec; /* Morado para Laptops */
            --accent-lp-glow: rgba(191, 85, 236, 0.2);
            --accent-hw: #00f2fe; /* Cian para Hardware */
            --accent-hw-glow: rgba(0, 242, 254, 0.2);
            --accent-sw: #4ade80; /* Verde para Software */
            --accent-sw-glow: rgba(74, 222, 128, 0.2);
            
            --border-color: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, var(--accent-lp), var(--accent-hw), var(--accent-sw));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .controls-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 1s ease-out;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.7rem 1.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.active[data-filter="all"] { border-color: #6366f1; color: #a5b4fc; background: rgba(99, 102, 241, 0.1); }
        .btn.active[data-filter="laptops"] { border-color: var(--accent-lp); color: var(--accent-lp); background: rgba(191, 85, 236, 0.1); }
