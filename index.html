<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguardia Tecnológica Pro | Hardware & Software</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #060913, #0b1120, #161233, #02040a);
            --card-bg: rgba(22, 32, 51, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-hw: #00f2fe; 
            --accent-hw-glow: rgba(0, 242, 254, 0.2);
            --accent-sw: #4ade80; 
            --accent-sw-glow: rgba(74, 222, 128, 0.2);
            --border-color: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, var(--accent-hw), var(--accent-sw));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .controls-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 1s ease-out;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.7rem 1.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.active[data-filter="all"] { border-color: #6366f1; color: #a5b4fc; background: rgba(99, 102, 241, 0.1); }
        .btn.active[data-filter="hardware"] { border-color: var(--accent-hw); color: var(--accent-hw); background: rgba(0, 242, 254, 0.1); }
        .btn.active[data-filter="software"] { border-color: var(--accent-sw); color: var(--accent-sw); background: rgba(74, 222, 128, 0.1); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            display: flex;
            flex-direction: column;
        }

        .card.hidden {
            display: none !important;
        }

        .card.hardware:hover {
            transform: translateY(-6px);
            border-color: var(--accent-hw);
            box-shadow: 0 10px 25px var(--accent-hw-glow);
        }

        .card.software:hover {
            transform: translateY(-6px);
            border-color: var(--accent-sw);
            box-shadow: 0 10px 25px var(--accent-sw-glow);
        }

        /* CONTENEDOR ESTÁNDAR PARA LAS IMÁGENES */
        .card-image-container {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-image-container img {
            transform: scale(1.06);
        }

        .card-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            z-index: 2;
        }

        .hardware .card-badge { background: rgba(0, 242, 254, 0.15); color: var(--accent-hw); backdrop-filter: blur(4px); }
        .software .card-badge { background: rgba(74, 222, 128, 0.15); color: var(--accent-sw); backdrop-filter: blur(4px); }

        .card-number {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0.15;
            margin-bottom: 0.5rem;
        }

        .card h3 {
            font-size: 1.35rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        #no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
            width: 100%;
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            margin-top: 5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            padding: 2rem 0;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

        <h1>Vanguardia Tecnológica</h1>
        <p>Explora de forma interactiva los 10 componentes de hardware y las 10 herramientas de software esenciales del ecosistema informático.</p>
    </header>

        <div class="filter-buttons">
